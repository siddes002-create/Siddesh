<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Retail Nanban</title>

<style>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial,sans-serif;
}

body{
  background:#fff;
  overflow-x:hidden;
}

/* HEADER */

nav{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:20px 40px;
  background:white;
}

.logo{
  font-size:28px;
  font-weight:bold;
  color:#ff4f6d;
}

nav ul{
  display:flex;
  gap:25px;
}

nav ul li{
  list-style:none;
}

nav ul li a{
  text-decoration:none;
  color:black;
  font-weight:bold;
}

/* HERO */

.hero{
  height:500px;
  background:url('https://images.unsplash.com/photo-1483985988355-763728e1935b?q=80&w=1200&auto=format&fit=crop') center/cover no-repeat;
  display:flex;
  justify-content:center;
  align-items:center;
  text-align:center;
  color:white;
}

.hero-content h1{
  font-size:70px;
  margin-bottom:10px;
}

.hero-content p{
  font-size:30px;
  margin-bottom:20px;
}

.hero-content button{
  padding:12px 25px;
  border:none;
  background:#ff4f6d;
  color:white;
  font-size:18px;
  border-radius:5px;
  cursor:pointer;
}

/* CATEGORY */

.section-title{
  text-align:center;
  font-size:45px;
  margin:40px 0 20px;
}

.category-grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:20px;
  padding:20px;
}

.category-card{
  background:#f5f5f5;
  border-radius:10px;
  overflow:hidden;
  text-align:center;
}

.category-card img{
  width:100%;
  height:300px;
  object-fit:cover;
}

.category-card h3{
  padding:15px;
}

/* MOBILE */

@media only screen and (max-width:768px){

  nav{
    flex-direction:column;
    padding:15px;
  }

  .logo{
    font-size:32px;
    margin-bottom:10px;
  }

  nav ul{
    flex-wrap:wrap;
    justify-content:center;
    gap:15px;
  }

  .hero{
    height:280px;
    padding:20px;
  }

  .hero-content h1{
    font-size:36px;
    line-height:45px;
  }

  .hero-content p{
    font-size:20px;
  }

  .hero-content button{
    font-size:15px;
    padding:10px 20px;
  }

  .section-title{
    font-size:32px;
  }

  .category-grid{
    grid-template-columns:1fr;
  }

  .category-card img{
    height:250px;
  }
}

</style>
</head>

<body>

<!-- HEADER -->

<header>

    <div class="logo">
        Retail Nanban
    </div>

    <nav>

        <a href="#">Home</a>

        <a href="mens.html">
            Mens
        </a>

        <a href="women.html">
            Women
        </a>

        <a href="kids.html">
            Kids
        </a>

        <a href="cart.html">
            🛒 Cart
        </a>

    </nav>

</header>



<!-- SLIDER -->

<div class="slider">

    <div class="slides fade">

        <img src="https://images.unsplash.com/photo-1483985988355-763728e1935b">

    </div>

    <div class="slides fade">

        <img src="https://images.unsplash.com/photo-1441986300917-64674bd600d8">

    </div>

    <div class="slides fade">

        <img src="https://images.unsplash.com/photo-1490481651871-ab68de25d43d">

    </div>


    <!-- TEXT -->

    <div class="hero-text">

        <h1>
            Fashion That Speaks
        </h1>

        <p class="scroll-text">
            Mens • Women • Kids Collection
        </p>

        <button>
            Shop Now
        </button>

    </div>


    <!-- BUTTONS -->

    <a class="prev"
    onclick="plusSlides(-1)">
        ❮
    </a>

    <a class="next"
    onclick="plusSlides(1)">
        ❯
    </a>

</div>



<!-- CATEGORY -->

<section class="categories">

    <h2>
        Shop By Category
    </h2>

    <div class="category-container">


        <!-- Mens -->

        <div class="category-card">

            <img src="https://images.unsplash.com/photo-1515886657613-9f3515b0c78f">

            <h3>Mens Collection</h3>

            <a href="mens.html">
                Explore
            </a>

        </div>



        <!-- Women -->

        <div class="category-card">

            <img src="https://images.unsplash.com/photo-1496747611176-843222e1e57c">

            <h3>Women Collection</h3>

            <a href="women.html">
                Explore
            </a>

        </div>



        <!-- Kids -->

        <div class="category-card">

            <img src="https://images.unsplash.com/photo-1519238263530-99bdd11df2ea">

            <h3>Kids Collection</h3>

            <a href="kids.html">
                Explore
            </a>

        </div>

    </div>

</section>



<script>

let slideIndex = 1;

showSlides(slideIndex);

function plusSlides(n){

    showSlides(slideIndex += n);

}

function showSlides(n){

    let slides =
    document.getElementsByClassName("slides");

    if(n > slides.length){

        slideIndex = 1;

    }

    if(n < 1){

        slideIndex = slides.length;

    }

    for(let i = 0; i < slides.length; i++){

        slides[i].style.display = "none";

    }

    slides[slideIndex-1].style.display = "block";

}


/* AUTO SLIDE */

setInterval(() => {

    plusSlides(1);

}, 3000);

</script>

</body>
</html>
