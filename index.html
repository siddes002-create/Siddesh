<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Retail Nanban</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f5f5f5;
}

/* HEADER */

header{
display:flex;
align-items:center;
justify-content:space-between;
padding:15px 30px;
background:#fff;
box-shadow:0 2px 10px rgba(0,0,0,.08);
position:sticky;
top:0;
z-index:999;
}

.logo{
    font-size:28px;
    font-weight:bold;
    color:#ff4f6d;
}

nav{
display:flex;
align-items:center;
gap:25px;
}

nav a{

text-decoration:none;

color:#222;

font-weight:bold;

transition:.3s;

}

nav a:hover{

color:#ff4f6d;

}

nav a:hover{
    color:#ff4f6d;
}

/* HERO */

.hero{
    position:relative;
    width:100%;
    height:450px;

   background-size:cover;
  background-position:center;
  background-repeat:no-repeat;
  transition:background-image .8s ease;
   
    display:flex;
    justify-content:center;
    align-items:center;
}

.overlay{
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.4);
}

/* CATEGORY */

.category-section{
    padding:60px 40px;
}

.category-title{
    text-align:center;
    font-size:50px;
    margin-bottom:40px;
}

.categories{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
    gap:25px;
}

.category-card{
    position:relative;
    overflow:hidden;
    border-radius:15px;
    cursor:pointer;
}

.category-card img{
    width:100%;
    height:400px;
    object-fit:cover;
    transition:0.4s;
}

.category-card:hover img{
    transform:scale(1.08);
}

.category-name{
    position:absolute;
    bottom:20px;
    left:20px;
    color:white;
    font-size:35px;
    font-weight:bold;
    z-index:2;
}

.card-overlay{
    position:absolute;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.3);
}

/* FOOTER */

footer{
    background:black;
    color:white;
    text-align:center;
    padding:20px;
    margin-top:40px;
}

/* MOBILE */

@media(max-width:768px){

    header{
        flex-direction:column;
        gap:15px;
    }

    nav{
        gap:15px;
        flex-wrap:wrap;
        justify-content:center;
    }

    .hero{
        height:350px;
    }

    .hero-content h1{
        font-size:40px;
    }

    .hero-content p{
        font-size:20px;
    }

    .category-title{
        font-size:35px;
    }

}
.left-header{
display:flex;
align-items:center;
gap:15px;
}

.menu-btn{
font-size:30px;
border:none;
background:none;
cursor:pointer;
}

.side-menu{

height:100%;
width:0;

position:fixed;

top:0;
left:0;

background:#222;

overflow-x:hidden;

transition:.4s;

padding-top:60px;

z-index:9999;

}

.side-menu a{

display:block;

padding:18px;

color:white;

text-decoration:none;

font-size:20px;

}

.side-menu a:hover{

background:#ff4f6d;

}

.closebtn{

position:absolute;

top:10px;

right:20px;

font-size:35px;

}
.search-box{
display:flex;
align-items:center;
width:350px;
}

.search-box input{

width:100%;
padding:12px;

border:1px solid #ddd;

border-radius:25px 0 0 25px;

}

.search-box button{

padding:12px 18px;

background:#ff4f6d;

color:white;

border:none;

border-radius:0 25px 25px 0;

cursor:pointer;

}
    .product-section{

padding:60px 40px;

background:#f5f5f5;

}

.product-section h2{

text-align:center;

font-size:40px;

margin-bottom:40px;

}

.products{

display:grid;

grid-template-columns:repeat(auto-fit,minmax(250px,1fr));

gap:25px;

}

.product-card{

background:#fff;

padding:20px;

border-radius:15px;

box-shadow:0 4px 15px rgba(0,0,0,.1);

text-align:center;

transition:.3s;

}

.product-card:hover{

transform:translateY(-8px);

}

.product-card img{

width:100%;

height:300px;

object-fit:cover;

border-radius:10px;

}

.price{

font-size:22px;

font-weight:bold;

color:#ff4f6d;

margin:10px 0;

}

.rating{

margin-bottom:15px;

}

.product-card button{

padding:12px 25px;

background:#ff4f6d;

color:white;

border:none;

border-radius:8px;

cursor:pointer;

font-weight:bold;

}

.product-card button:hover{

background:#ff2f55;

}
</style>

</head>
<body>

<!-- HEADER -->

<header>

<div class="left-header">

<button class="menu-btn" onclick="openMenu()">
☰
</button>

<div class="logo">
Retail Nanban
</div>

</div>
<div class="search-box">
    <input type="text"
           id="searchInput"
           placeholder="Search Products...">

    <button onclick="searchProduct()">
        🔍
    </button>
</div>
  <nav>
<a href="index.html">Home</a>
<a href="mens.html">Mens</a>
<a href="women.html">Women</a>
<a href="kids.html">Kids</a>
<a href="register.html">Register</a>
<a href="login.html" id="loginLink">👤 Login</a>
<a href="#" id="logoutLink" style="display:none;">Logout</a>
<a href="cart.html">
🛒 Cart (<span id="cartCount">0</span>)
</a>
</nav>

</header>
<div id="sideMenu" class="side-menu">

    <a href="javascript:void(0)" class="closebtn" onclick="closeMenu()">&times;</a>

    <a href="index.html">🏠 Home</a>
    <a href="mens.html">👔 Mens</a>
    <a href="women.html">👗 Women</a>
    <a href="kids.html">🧒 Kids</a>
    <a href="register.html">📝 Register</a>
    <a href="login.html">👤 Login</a>
    <a href="cart.html">🛒 Cart</a>

</div>
<!-- HERO -->

<section class="hero">

    <div class="overlay"></div>

</section>

<!-- CATEGORY -->

<h2>🔥 Trending Products</h2>

<div class="products">

<div class="product-card">

<img src="https://images.unsplash.com/photo-1602810318383-e386cc2a3ccf?w=600">

<h3>Casual Shirt</h3>

<p class="price">₹799</p>

<p class="rating">⭐⭐⭐⭐⭐</p>

<button>Add to Cart</button>

</div>

<div class="product-card">

<img src="https://images.unsplash.com/photo-1542272604-787c3835535d?w=600">

<h3>Blue Jeans</h3>

<p class="price">₹999</p>

<p class="rating">⭐⭐⭐⭐⭐</p>

<button>Add to Cart</button>

</div>

<div class="product-card">

<img src="https://images.unsplash.com/photo-1521572163474-6864f9cf17ab?w=600">

<h3>T-Shirt</h3>

<p class="price">₹599</p>

<p class="rating">⭐⭐⭐⭐</p>

<button>Add to Cart</button>

</div>

<div class="product-card">

<img src="https://images.unsplash.com/photo-1512436991641-6745cdb1723f?w=600">

<h3>Hoodie</h3>

<p class="price">₹1199</p>

<p class="rating">⭐⭐⭐⭐⭐</p>

<button>Add to Cart</button>

</div>

</div>
</div>
</div>
</div>

</section>

<!-- FOOTER -->

<footer>

    © 2026 Retail Nanban | All Rights Reserved

</footer>
<script>
let user = localStorage.getItem("loggedInUser");

if(user){
    document.getElementById("loginLink").innerHTML = "👤 " + user;
    document.getElementById("logoutLink").style.display = "inline";
}

document.getElementById("logoutLink").addEventListener("click", function(e){
    e.preventDefault();

    localStorage.removeItem("loggedInUser");

    location.reload();
});
    let cart = JSON.parse(localStorage.getItem("cart")) || [];
document.getElementById("cartCount").innerText = cart.length;
    function openMenu(){

document.getElementById("sideMenu").style.width="260px";

}

function closeMenu(){

document.getElementById("sideMenu").style.width="0";

}
    function searchProduct(){

let value=document
.getElementById("searchInput")
.value
.toLowerCase();

if(value.includes("shirt") || value.includes("men")){

window.location.href="mens.html";

}
else if(value.includes("women")){

window.location.href="women.html";

}
else if(value.includes("kids")){

window.location.href="kids.html";

}
else{

alert("No Product Found");

}

}
 const heroImages = [
"https://images.unsplash.com/photo-1441986300917-64674bd600d8?q=120&w=2070&auto=format&fit=crop",
"https://images.unsplash.com/photo-1483985988355-763728e1935b?q=120&w=2070&auto=format&fit=crop",
"https://images.unsplash.com/photo-1519340241574-2cec6aef0c01?q=120&w=1200&auto=format&fit=crop"
];

let currentImage = 0;
const hero = document.querySelector(".hero");

function changeHero() {
    hero.style.backgroundImage = `url('${heroImages[currentImage]}')`;
    currentImage = (currentImage + 1) % heroImages.length;
}

changeHero();
setInterval(changeHero, 3000);   
</script>
</body>
</html>
