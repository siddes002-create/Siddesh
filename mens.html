<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mens Collection</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial;
}

body{
  background:#f1f3f6;
}

.navbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:20px;
  background:white;
}

.logo{
  font-size:28px;
  font-weight:bold;
  color:#ff4d6d;
}

.nav-links a{
  text-decoration:none;
  color:black;
  margin-left:20px;
  font-weight:bold;
}

.banner img{
  width:100%;
  height:300px;
  object-fit:cover;
}

.categories{
  display:flex;
  justify-content:center;
  gap:20px;
  padding:18px;
  background:white;
}

.categories button{
  padding:10px 20px;
  border:none;
  background:black;
  color:white;
  border-radius:30px;
  cursor:pointer;
  font-weight:bold;
}

.products{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:20px;
  padding:20px;
}

.product-card{
  background:white;
  padding:12px;
  border-radius:10px;
  transition:0.3s;
}

.product-card:hover{
  transform:translateY(-5px);
}

.product-card img{
  width:100%;
  height:260px;
  object-fit:cover;
  border-radius:8px;
  cursor:pointer;
  transition:0.3s;
}

.product-card img:hover{
  transform:scale(1.03);
}

.product-name{
  text-decoration:none;
  color:black;
}

.product-card h3{
  margin-top:10px;
}

.price{
  font-size:24px;
  font-weight:bold;
  margin-top:10px;
}

.stock{
  color:green;
  margin-top:5px;
}

@media(max-width:768px){

.banner img{
  height:180px;
}

.categories{
  overflow:auto;
  padding:10px;
}

.categories button{
  white-space:nowrap;
}

.products{
  grid-template-columns:repeat(2,1fr);
  gap:10px;
  padding:10px;
}

.product-card img{
  height:180px;
}

.logo{
  font-size:22px;
}

}

</style>

</head>
<body>

<div class="navbar">

  <div class="logo">
    Retail Nanban
  </div>

  <div class="nav-links">
    <a href="index.html">Home</a>
    <a href="women.html">Women</a>
    <a href="kids.html">Kids</a>
  </div>

</div>

<div class="banner">

<img src="https://images.unsplash.com/photo-1483985988355-763728e1935b?q=80&w=1200&auto=format&fit=crop">

</div>

<div class="categories">

<button>All</button>
<button>Casual Shirts</button>
<button>T-Shirts</button>
<button>Pants</button>
<button>Hoodies</button>

</div>

<div class="products" id="products"></div>

<script>

const products = [

{
 id:1,
 name:"smart shirt",
 price:799,
 image:"https://images.unsplash.com/photo-1603252109303-2751441dd157?q=80&w=1000&auto=format&fit=crop",
 stock:12
},

{
 id:2,
 name:"denim shirt",
 price:899,
 image:"https://images.unsplash.com/photo-1562157873-818bc0726f68?q=80&w=1000&auto=format&fit=crop",
 stock:10
},

{
 id:3,
 name:"check shirt",
 price:899,
 image:"https://images.unsplash.com/photo-1521572163474-6864f9cf17ab?q=80&w=1000&auto=format&fit=crop",
 stock:10
},

{
 id:4,
 name:"white t-shirt",
 price:899,
 image:"https://images.unsplash.com/photo-1527719327859-c6ce80353573?q=80&w=1000&auto=format&fit=crop",
 stock:10
},

{
 id:5,
 name:"pants",
 price:1099,
 image:"https://images.unsplash.com/photo-1473966968600-fa801b869a1a?q=80&w=1000&auto=format&fit=crop",
 stock:10
},

{
 id:6,
 name:"jeans",
 price:1099,
 image:"https://images.unsplash.com/photo-1542272604-787c3835535d?q=80&w=1000&auto=format&fit=crop",
 stock:10
}

];

let output = "";

products.forEach((p)=>{

output += `

<div class="product-card">

<a href="#" onclick="openProduct(${p.id})">

<img src="${p.image}">

</a>

<a href="#" onclick="openProduct(${p.id})" class="product-name">

<h3>${p.name}</h3>

</a>

<div class="price">
₹${p.price}
</div>

<div class="stock">
Only ${p.stock} left
</div>

</div>

`;

});

document.getElementById("products").innerHTML = output;

function openProduct(id){

const product =
products.find(p => p.id == id);

localStorage.setItem(
"selectedProduct",
JSON.stringify(product)
);

window.location.href = "product.html";

}

</script>

</body>
</html>
