<!DOCTYPE html>
<html>

<head>

  <title>Mens Collection</title>

  <style>

    body{
      margin:0;
      font-family:Arial;
      background:#f5f5f5;
    }

    nav{
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:20px 30px;
      background:white;
    }

    .logo{
      font-size:40px;
      font-weight:bold;
      color:#ff4d6d;
    }

    nav ul{
      display:flex;
      list-style:none;
      gap:30px;
    }

    nav ul li a{
      text-decoration:none;
      color:black;
      font-weight:bold;
    }

    .banner img{
      width:100%;
      height:350px;
      object-fit:cover;
    }

    #products{
      display:flex;
      flex-wrap:wrap;
      gap:20px;
      justify-content:center;
      padding:40px;
    }

    .product-card{
      width:250px;
      background:white;
      padding:15px;
      border-radius:10px;
      box-shadow:0 0 10px rgba(0,0,0,0.1);
      text-align:center;
    }

    .product-card img{
      width:100%;
      height:300px;
      object-fit:cover;
      border-radius:10px;
    }

    .product-card button{
      background:black;
      color:white;
      border:none;
      padding:10px 20px;
      cursor:pointer;
      border-radius:5px;
    }

  </style>

</head>

<body>

  <nav>

    <div class="logo">
      Zudora
    </div>

    <ul>
      <li><a href="index.html">Home</a></li>
      <li><a href="women.html">Women</a></li>
      <li><a href="kids.html">Kids</a></li>
    </ul>

  </nav>

  <div class="banner">

    <img src="https://images.unsplash.com/photo-1503342217505-b0a15ec3261c?q=80&w=1200&auto=format&fit=crop">

  </div>

  <div id="products"></div>

<script>

let products =
JSON.parse(localStorage.getItem("products")) || [];

let output = "";

products.forEach((p)=>{

  output += `

  <div class="product-card">

    <img src="${p.image}">

    <h3>${p.name}</h3>

    <p>₹${p.price}</p>

    <p>Stock : ${p.stock}</p>

    <button>Add to Cart</button>

  </div>

  `;

});

document.getElementById("products").innerHTML = output;

</script>

</body>
</html>
