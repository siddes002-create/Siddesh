<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mens Collection</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial;
}

body{
  background:#f1f3f6;
}
.navbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:20px;
  background:white;
}
#darkBtn{
padding:10px 15px;
border:none;
border-radius:8px;
background:black;
color:white;
cursor:pointer;
margin:20px;
}

.dark-mode{
background:#111;
color:white;
}

.dark-mode .product-card{
background:#222;
color:white;
}
.logo{
  font-size:28px;
  font-weight:bold;
  color:#ff4d6d;
}

.nav-links a{
  text-decoration:none;
  color:black;
  margin-left:20px;
  font-weight:bold;
}

.banner img{
  width:100%;
  height:300px;
  object-fit:cover;
}

.categories{
  display:flex;
  justify-content:center;
  gap:20px;
  padding:18px;
  background:white;
}

.categories button{
  padding:10px 20px;
  border:none;
  background:black;
  color:white;
  border-radius:30px;
  cursor:pointer;
  font-weight:bold;
}

.products{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:20px;
  padding:20px;
}

.product-card{
  background:white;
  padding:12px;
  border-radius:10px;
  transition:0.3s;
}

.product-card:hover{
  transform:translateY(-5px);
}

.product-card img{
  width:100%;
  height:260px;
  object-fit:cover;
  border-radius:8px;
  cursor:pointer;
  transition:0.3s;
}
  .product-card button{
padding:10px 14px;
border:none;
background:red;
color:white;
border-radius:8px;
cursor:pointer;
margin-top:10px;
}
#searchInput{
width:300px;
padding:12px;
margin:20px;
border-radius:8px;
border:1px solid #ccc;
font-size:16px;
}
.product-card img:hover{
  transform:scale(1.03);
}

.product-name{
  text-decoration:none;
  color:black;
}

.product-card h3{
  margin-top:10px;
}

.price{
  font-size:24px;
  font-weight:bold;
  margin-top:10px;
}

.stock{
  color:green;
  margin-top:5px;
}

@media(max-width:768px){

.banner img{
  height:180px;
}

.categories{
  overflow:auto;
  padding:10px;
}

.categories button{
  white-space:nowrap;
}

.products{
  grid-template-columns:repeat(2,1fr);
  gap:10px;
  padding:10px;
}

.product-card img{
  height:180px;
}

.logo{
  font-size:22px;
}

}

</style>

</head>
<body>
  <button onclick="toggleDarkMode()" id="darkBtn">
🌙 Dark Mode
</button>
<input
type="text"
id="searchInput"
placeholder="Search Product..."
onkeyup="searchProducts()"
>
<div class="navbar">

  <div class="logo">
    Retail Nanban
  </div>

  <div class="nav-links">
    <a href="index.html">Home</a>
    <a href="women.html">Women</a>
    <a href="kids.html">Kids</a>
    <a href="cart.html">Cart 🛒 <span id="cart-count">0</span></a>
  </div>

</div>

<div class="banner">

<img src="https://images.unsplash.com/photo-1483985988355-763728e1935b?q=80&w=1200&auto=format&fit=crop">

</div>

<div class="categories">

<button>All</button>
<button>Casual Shirts</button>
<button>T-Shirts</button>
<button>Pants</button>
<button>Hoodies</button>

</div>

<div class="products" id="products"></div>
<script>

const productsData = [

{
name:"Check Shirt",
price:899,
image:"https://images.unsplash.com/photo-1521572163474-6864f9cf17ab"
},

{
name:"Smart Shirt",
price:799,
image:"https://images.unsplash.com/photo-1483985988355-763728e1935b"
},

{
name:"Casual Shirt",
price:999,
image:"https://images.unsplash.com/photo-1512436991641-6745cdb1723f"
}

];

let output = "";

productsData.forEach(product=>{

output += `

<div class="product-card">

<img
src="${product.image}"
onclick='openProduct(${JSON.stringify(product)})'
>

<h3>${product.name}</h3>

<p>₹${product.price}</p>

<button onclick="addWishlist(this)">
❤️
</button>

</div>

`;

});

document.getElementById("products").innerHTML =
output;

function openProduct(product){

localStorage.setItem(
"selectedProduct",
JSON.stringify(product)
);

window.location.href = "product.html";

}

function addWishlist(button){

if(button.innerText == "❤️"){

button.innerText = "💖";

alert("Added to Wishlist");

}
else{

button.innerText = "❤️";

}

}

function toggleDarkMode(){

document.body.classList.toggle("dark-mode");

}

function searchProducts(){

const input =
document.getElementById("searchInput")
.value
.toLowerCase();

const products =
document.querySelectorAll(".product-card");

products.forEach(product=>{

const name =
product.innerText.toLowerCase();

if(name.includes(input)){
product.style.display = "block";
}
else{
product.style.display = "none";
}

});

}

</script>
</body>
</html>
