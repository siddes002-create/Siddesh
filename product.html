<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Product Details</title>

<style>

body{
  font-family: Arial;
  margin: 0;
  padding: 30px;
  background: #f1f3f6;
}

.product-container{
  display: flex;
  gap: 40px;
  background: white;
  padding: 30px;
  border-radius: 10px;
}

.left{
  width: 40%;
}

.left img{
  width: 100%;
  border-radius: 10px;
}

.right{
  width: 60%;
}

.product-title{
  font-size: 32px;
  margin-bottom: 10px;
}

.price{
  font-size: 30px;
  color: green;
  font-weight: bold;
  margin-bottom: 20px;
}

.size-title{
  font-size: 20px;
  margin-bottom: 10px;
}

.sizes{
  display: flex;
  gap: 15px;
  margin-bottom: 30px;
}

.size-btn{
  padding: 10px 18px;
  border: 2px solid #ccc;
  background: white;
  cursor: pointer;
  border-radius: 6px;
  font-size: 16px;
}

.size-btn:hover{
  border-color: blue;
  color: blue;
}

.buttons{
  display: flex;
  gap: 20px;
}

.cart-btn{
  background: orange;
  color: white;
  border: none;
  padding: 15px 35px;
  font-size: 18px;
  border-radius: 8px;
  cursor: pointer;
}

.buy-btn{
  background: #fb641b;
  color: white;
  border: none;
  padding: 15px 35px;
  font-size: 18px;
  border-radius: 8px;
  cursor: pointer;
}

.desc{
  margin-top: 30px;
  line-height: 1.7;
  color: #444;
}

</style>

</head>
<body>

<div class="product-container">

  <div class="left">
    <img src="https://images.unsplash.com/photo-1602810318383-e386cc2a3ccf?q=80&w=900&auto=format&fit=crop">
  </div>

  <div class="right">

    <div class="product-title">
      Premium Stylish Shirt
    </div>

    <div class="price">
      ₹799
    </div>

    <div class="size-title">
      Select Size
    </div>

    <div class="sizes">
      <button class="size-btn">S</button>
      <button class="size-btn">M</button>
      <button class="size-btn">L</button>
      <button class="size-btn">XL</button>
    </div>

    <div class="buttons">

      <button class="cart-btn">
        Add to Cart
      </button>

      <button class="buy-btn">
        Buy Now
      </button>

    </div>

    <div class="desc">

      Premium quality cotton shirt.  
      Comfortable for daily wear.  
      Stylish modern fit design.  
      Best for casual and party wear.

    </div>

  </div>

</div>

</body>
</html>
