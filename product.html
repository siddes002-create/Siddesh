<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Product Details</title>

<style>

body{
  font-family: Arial;
  margin: 0;
  padding: 30px;
  background: #f1f3f6;
}

.product-container{
  display: flex;
  gap: 40px;
  background: white;
  padding: 30px;
  border-radius: 10px;
}

.left{
  width: 40%;
}

.left img{
  width: 100%;
  border-radius: 10px;
}

.right{
  width: 60%;
}

.product-title{
  font-size: 32px;
  margin-bottom: 10px;
}

.price{
  font-size: 30px;
  color: green;
  font-weight: bold;
  margin-bottom: 20px;
}

.size-title{
  font-size: 20px;
  margin-bottom: 10px;
}

.sizes{
  display: flex;
  gap: 15px;
  margin-bottom: 30px;
}

.size-btn{
  padding: 10px 18px;
  border: 2px solid #ccc;
  background: white;
  cursor: pointer;
  border-radius: 6px;
  font-size: 16px;
}

.size-btn:hover{
  border-color: blue;
  color: blue;
}

.buttons{
  display: flex;
  gap: 20px;
}

.cart-btn{
  background: orange;
  color: white;
  border: none;
  padding: 15px 35px;
  font-size: 18px;
  border-radius: 8px;
  cursor: pointer;
}

.buy-btn{
  background: #fb641b;
  color: white;
  border: none;
  padding: 15px 35px;
  font-size: 18px;
  border-radius: 8px;
  cursor: pointer;
}

.desc{
  margin-top: 30px;
  line-height: 1.7;
  color: #444;
}
.active-size{
background:blue;
color:white;
border-color:blue;
}
</style>

</head>
<body>

<div class="product-container">

  <div class="left">
   <img id="productImage">
  </div>

  <div class="right">

    <div class="product-title" id="productName"></div>

    <div class="price" id="productPrice"></div>
    
    <div class="size-title">
      Select Size
    </div>

  <div class="sizes">

<button class="size-btn" onclick="selectSize(this)">S</button>

<button class="size-btn" onclick="selectSize(this)">M</button>

<button class="size-btn" onclick="selectSize(this)">L</button>

<button class="size-btn" onclick="selectSize(this)">XL</button>

</div>

    <div class="buttons">

      <button onclick="addToCart()" class="cart-btn">
  Add to Cart
</button>

      <button class="buy-btn">
        Buy Now
      </button>

    </div>

    <div class="desc">

      Premium quality cotton shirt.  
      Comfortable for daily wear.  
      Stylish modern fit design.  
      Best for casual and party wear.

    </div>

  </div>

</div>
<script>

const product =
JSON.parse(localStorage.getItem("selectedProduct"));

document.getElementById("productImage").src =
product.image;

document.getElementById("productName").innerText =
product.name;

document.getElementById("productPrice").innerText =
"₹" + product.price;

function selectSize(button){
function addToCart() {

  const selectedSize =
    document.querySelector(".active-size")?.innerText;

  if (!selectedSize) {
    alert("Please select size");
    return;
  }

  const cartItem = {
    image: product.image,
    name: product.name,
    price: product.price,
    size: selectedSize
  };

  let cart =
    JSON.parse(localStorage.getItem("cart")) || [];

  cart.push(cartItem);

  localStorage.setItem("cart", JSON.stringify(cart));

  alert("Added to Cart");
}
document
.querySelectorAll(".size-btn")
.forEach((btn)=>{
btn.classList.remove("active-size");
});

button.classList.add("active-size");

}

</script>
</body>
</html>
