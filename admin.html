<!DOCTYPE html>
<html>

<head>

<title>Admin Login</title>

<style>

body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#f5f5f5;
    font-family:Arial;
}

.login-box{
    background:white;
    padding:40px;
    width:350px;
    border-radius:15px;
    box-shadow:0 2px 15px rgba(0,0,0,0.2);
    text-align:center;
}

h1{
    margin-bottom:30px;
    color:#ff4d6d;
}

input{
    width:100%;
    padding:14px;
    margin:10px 0;
    border:1px solid #ccc;
    border-radius:8px;
    font-size:16px;
}

button{
    width:100%;
    padding:14px;
    border:none;
    background:#ff4d6d;
    color:white;
    font-size:18px;
    border-radius:8px;
    cursor:pointer;
    margin-top:15px;
}

button:hover{
    background:#e63956;
}

</style>

</head>

<body>

<div class="login-box">

    <h1>Admin Login</h1>
<h2>Update Stock</h2>

<input type="number"
id="shirtStock"
placeholder="Casual Shirt Stock">

<button onclick="saveStock()">
    Save Stock
</button>
    <input type="text"
    id="username"
    placeholder="Enter Username">

    <input type="password"
    id="password"
    placeholder="Enter Password">

    <button onclick="login()">
        Login
    </button>

</div>


<script>

function login(){

    let username =
    document.getElementById("username").value;

    let password =
    document.getElementById("password").value;

    if(username == "admin" &&
       password == "1234"){

        alert("Login Success");

        window.location.href =
        "index.html";

    }else{

        alert("Wrong Username or Password");

    }

}
function saveStock(){

    let stock =
    document.getElementById("shirtStock").value;

    localStorage.setItem(
        "shirtStock",
        stock
    );

    alert("Stock Updated");

}
</script>

</body>
</html>
