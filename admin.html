<!DOCTYPE html>
<html>

<head>
  <title>Admin Login</title>

  <style>
    body{
      margin:0;
      font-family:Arial;
      background:#f5f5f5;
    }

    .login-box{
      width:300px;
      margin:100px auto;
      background:white;
      padding:30px;
      border-radius:10px;
      box-shadow:0 0 10px rgba(0,0,0,0.1);
      text-align:center;
    }

    input{
      width:90%;
      padding:10px;
      margin:10px 0;
    }

    button{
      padding:10px 20px;
      background:black;
      color:white;
      border:none;
      cursor:pointer;
    }

    .product-box{
      border:1px solid #ccc;
      padding:20px;
      margin:20px;
      width:250px;
      background:white;
      border-radius:10px;
    }

    .product-box img{
      width:100%;
      height:250px;
      object-fit:cover;
    }

    #products{
      display:flex;
      flex-wrap:wrap;
    }
  </style>

</head>

<body>

  <div class="login-box">

    <h2>Admin Login</h2>

    <input type="text"
    id="email"
    placeholder="Username">

    <input type="password"
    id="password"
    placeholder="Password">

    <button onclick="login()">
      Login
    </button>

  </div>

<script>

function login() {

  let email =
  document.getElementById("email").value;

  let password =
  document.getElementById("password").value;

  if(email === "admin" && password === "1234") {

    document.body.innerHTML = `

    <div style="padding:30px">

      <h1>Admin Panel</h1>

      <input type="text"
      id="name"
      placeholder="Product Name">

      <br>

      <input type="number"
      id="price"
      placeholder="Price">

      <br>

      <input type="number"
      id="stock"
      placeholder="Stock">

      <br>

      <input type="text"
      id="image"
      placeholder="Image URL">

      <br><br>

      <button onclick="addProduct()">
        Add Product
      </button>

      <hr>

      <div id="products"></div>

    </div>

    `;

    loadProducts();

  }

  else{
    alert("Wrong Login");
  }

}

function addProduct(){

  let name =
  document.getElementById("name").value;

  let price =
  document.getElementById("price").value;

  let stock =
  document.getElementById("stock").value;

  let image =
  document.getElementById("image").value;

  let product = {
    name:name,
    price:price,
    stock:stock,
    image:image
  };

  let products =
  JSON.parse(localStorage.getItem("products")) || [];

  products.push(product);

  localStorage.setItem(
    "products",
    JSON.stringify(products)
  );

  loadProducts();

  alert("Product Added");

}

function loadProducts(){

  let products =
  JSON.parse(localStorage.getItem("products")) || [];

  let output = "";

  products.forEach((p,index)=>{

    output += `

    <div class="product-box">

      <img src="${p.image}">

      <h3>${p.name}</h3>

      <p>₹${p.price}</p>

      <p>Stock : ${p.stock}</p>

      <button onclick="deleteProduct(${index})"
      style="background:red">
        Delete
      </button>

    </div>

    `;

  });

  document.getElementById("products").innerHTML = output;

}

function deleteProduct(index){

  let products =
  JSON.parse(localStorage.getItem("products")) || [];

  products.splice(index,1);

  localStorage.setItem(
    "products",
    JSON.stringify(products)
  );

  loadProducts();

}

</script>

</body>
</html>
