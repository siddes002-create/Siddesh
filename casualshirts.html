<!DOCTYPE html>
<html>

<head>

<title>Casual Shirts</title>

<style>

body{
  margin:0;
  font-family:Arial;
  background:#f1f3f6;
}

nav{
  background:white;
  padding:20px;
  font-size:30px;
  font-weight:bold;
}

.products{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
  padding:30px;
}

.card{
  background:white;
  padding:15px;
  border-radius:10px;
}

.card img{
  width:100%;
  height:320px;
  object-fit:cover;
}

.card button{
  width:100%;
  padding:12px;
  background:#2874f0;
  color:white;
  border:none;
  margin-top:10px;
}

</style>

</head>

<body>

<nav>
Retail Nanban
</nav>

<div class="products">

<div class="card">

<img src="https://images.unsplash.com/photo-1596755094514-f87e34085b2c?q=80&w=1000&auto=format&fit=crop">

<h3>Casual Shirt</h3>

<p>₹999</p>

<button>Add To Cart</button>

</div>

<div class="card">

<img src="https://images.unsplash.com/photo-1603252109303-2751441dd157?q=80&w=1000&auto=format&fit=crop">

<h3>Slim Fit Shirt</h3>

<p>₹1199</p>

<button>Add To Cart</button>

</div>

<div class="card">

<img src="https://images.unsplash.com/photo-1602810318383-e386cc2a3ccf?q=80&w=1000&auto=format&fit=crop">

<h3>Checked Shirt</h3>

<p>₹899</p>

<button>Add To Cart</button>

</div>

</div>

</body>
</html>
