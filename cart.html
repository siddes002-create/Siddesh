<!DOCTYPE html>
<html>
<head>
<title>Cart</title>

<style>

body{
font-family:Arial;
padding:20px;
background:#f1f3f6;
}

.cart-item{
display:flex;
gap:20px;
background:white;
padding:15px;
margin-bottom:20px;
border-radius:10px;
align-items:center;
}

.cart-item img{
width:120px;
height:120px;
object-fit:cover;
border-radius:10px;
}

.price{
font-size:22px;
font-weight:bold;
color:green;
margin-top:10px;
}

</style>

</head>

<body>

<h1>Your Cart 🛒</h1>

<div id="cartItems"></div>

<script>

const cart =
JSON.parse(localStorage.getItem("cart")) || [];

let output = "";

cart.forEach((item)=>{

output += `

<div class="cart-item">

<img src="${item.image}">

<div>

<h2>${item.name}</h2>

<div class="price">
₹${item.price}
</div>

</div>

</div>

`;

});

document.getElementById("cartItems").innerHTML =
output;

</script>

</body>
</html>
