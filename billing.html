<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Retail Nanban Billing POS</title>
<style>
<link rel="stylesheet" href="css/billing.css">
</style>
</head>
<body>
<header>Retail Nanban Billing POS</header>

<div class="wrap">
<div class="card">
<h2>Customer</h2>
<input
id="custName"
placeholder="Customer Name"
style="
height:45px;
font-size:16px;
border-radius:8px;
">
<input
id="custPhone"
placeholder="Phone Number"
style="
height:45px;
font-size:16px;
border-radius:8px;
">

<h2>Add Product</h2>
<input
id="sku"
placeholder="🔍 Scan Barcode..."
onkeydown="searchSKU(event)"
autofocus
style="
width:100%;
height:55px;
font-size:20px;
font-weight:bold;
border:2px solid #ff4f6d;
border-radius:10px;
padding-left:15px;
">
<input id="pname" placeholder="Product Name">
<div style="display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:10px">
<input id="qty" type="number" value="1" min="1">
<input id="price" type="number" placeholder="Price">
<select id="size">
<option>S</option><option>M</option><option>L</option><option>XL</option><option>XXL</option>
</select>
<button
onclick="addItem()"
style="
height:55px;
font-size:18px;
font-weight:bold;
border-radius:10px;
">
➕ ADD
</button>
</div>

<table>
<thead><tr><th>Product</th><th>Size</th><th>Qty</th><th>Rate</th><th>Total</th><th></th></tr></thead>
<tbody id="cart"></tbody>
</table>
</div>

<div class="card">
<h2>Bill Summary</h2>
<div class="total">
<p><span>Subtotal</span><span id="sub">₹0</span></p>
<p><span>Discount</span><span>₹0</span></p>
<h3 style="display:flex;justify-content:space-between"><span>Grand Total</span><span id="grand">₹0</span></h3>
</div>
<select id="payment">
<option>Cash</option>
<option>UPI</option>
<option>Card</option>
</select>
<br><br>
<button
onclick="saveBill()"
style="
width:100%;
height:55px;
font-size:20px;
font-weight:bold;
margin-top:20px;
">
💾 SAVE BILL
</button>
<button
onclick="window.print()"
style="
width:100%;
height:55px;
font-size:18px;
margin-top:10px;
">
🖨 PRINT
</button>
</div>
</div>

</body>
</html>
