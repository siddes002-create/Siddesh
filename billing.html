<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Retail Nanban Billing POS</title>
<style>
body{font-family:Arial,sans-serif;margin:0;background:#f4f4f4}
header{background:#ff4f6d;color:#fff;padding:18px;text-align:center;font-size:30px;font-weight:bold}
.wrap{display:grid;grid-template-columns:2fr 1fr;gap:20px;padding:20px}
.card{background:#fff;border-radius:10px;padding:20px;box-shadow:0 2px 8px rgba(0,0,0,.08)}
input,select,button{padding:10px;border:1px solid #ccc;border-radius:6px}
input,select{width:100%;margin:8px 0}
button{background:#ff4f6d;color:#fff;border:none;cursor:pointer}
table{width:100%;border-collapse:collapse;margin-top:15px}
th,td{padding:10px;border-bottom:1px solid #ddd;text-align:left}
th{background:#ff4f6d;color:#fff}
.total p{display:flex;justify-content:space-between}
@media(max-width:900px){.wrap{grid-template-columns:1fr}}
</style>
</head>
<body>
<header>Retail Nanban Billing POS</header>

<div class="wrap">
<div class="card">
<h2>Customer</h2>
<input id="custName" placeholder="Customer Name">
<input id="custPhone" placeholder="Phone Number">

<h2>Add Product</h2>
<input
id="sku"
placeholder="Scan / Enter Barcode"
onkeydown="searchSKU(event)"
autofocus>
<input id="pname" placeholder="Product Name">
<div style="display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:10px">
<input id="qty" type="number" value="1" min="1">
<input id="price" type="number" placeholder="Price">
<select id="size">
<option>S</option><option>M</option><option>L</option><option>XL</option><option>XXL</option>
</select>
<button onclick="addItem()">Add</button>
</div>

<table>
<thead><tr><th>Product</th><th>Size</th><th>Qty</th><th>Rate</th><th>Total</th><th></th></tr></thead>
<tbody id="cart"></tbody>
</table>
</div>

<div class="card">
<h2>Bill Summary</h2>
<div class="total">
<p><span>Subtotal</span><span id="sub">₹0</span></p>
<p><span>Discount</span><span>₹0</span></p>
<h3 style="display:flex;justify-content:space-between"><span>Grand Total</span><span id="grand">₹0</span></h3>
</div>
<select id="payment">
<option>Cash</option>
<option>UPI</option>
<option>Card</option>
</select>
<br><br>
<button onclick="saveBill()">Save Bill</button>
<button onclick="window.print()">Print</button>
</div>
</div>

<script>
 let products = JSON.parse(localStorage.getItem("products")) || [];
let cart = [];
 function searchSKU(event){

    if(event.key !== "Enter") return;

    let code = document.getElementById("sku").value.trim();

    let styleNo = code.slice(0,5);

    console.log("Products :", products);
    console.log("Style No :", styleNo);

    let sizeCode = code.slice(5);

    let sizeMap = {
        "1":"S",
        "2":"M",
        "3":"L",
        "4":"XL",
        "5":"XXL"
    };

    let product = products.find(p => p.styleNo === styleNo);

    if(!product){
        alert("Product Not Found");
        return;
    }

    document.getElementById("pname").value = product.name;
    document.getElementById("price").value = product.price;
    document.getElementById("size").value = sizeMap[sizeCode];
  addItem();

document.getElementById("sku").value = "";

document.getElementById("sku").focus();
}
function addItem(){

let p=document.getElementById('pname').value;

let q=parseInt(document.getElementById('qty').value)||1;

let r=parseFloat(document.getElementById('price').value)||0;

let s=document.getElementById('size').value;

if(!p||r<=0){

alert("Enter product and price");

return;

}

let existingItem = cart.find(item =>
    item.name === p &&
    item.size === s
);

if(existingItem){

    existingItem.qty += q;

}else{

    cart.push({
        name:p,
        size:s,
        qty:q,
        price:r
    });

}

document.getElementById('pname').value="";
document.getElementById('price').value="";
document.getElementById('qty').value = 1;
document.getElementById('size').selectedIndex = 0; 

render();

}
function render(){
 let tb=document.getElementById('cart');
 tb.innerHTML="";
 let total=0;
 cart.forEach((i,n)=>{
   total+=i.qty*i.price;
   tb.innerHTML+=`<tr>
   <td>${i.name}</td>
   <td>${i.size}</td>
   <td>${i.qty}</td>
   <td>₹${i.price}</td>
   <td>₹${i.qty*i.price}</td>
   <td><button onclick="del(${n})">X</button></td>
   </tr>`;
 });
 document.getElementById("sub").innerText="₹"+total;
 document.getElementById("grand").innerText="₹"+total;
}
function del(i){cart.splice(i,1);render();}
function saveBill(){
 let orders=JSON.parse(localStorage.getItem("orders"))||[];
 orders.push({
   customer:document.getElementById("custName").value,
   phone:document.getElementById("custPhone").value,
   payment:document.getElementById("payment").value,
   status:"Pending",
   orderDate:new Date().toISOString(),
   items:cart
 });
 let products =
JSON.parse(localStorage.getItem("products")) || [];

cart.forEach(item => {

    let product = products.find(
        p => p.name === item.name
    );

    if(product){

        if(product.sizes && product.sizes[item.size] != null){

            product.sizes[item.size] -= item.qty;

            if(product.sizes[item.size] < 0){
                product.sizes[item.size] = 0;
            }

            product.stock =
                (product.sizes.S || 0) +
                (product.sizes.M || 0) +
                (product.sizes.L || 0) +
                (product.sizes.XL || 0) +
                (product.sizes.XXL || 0);

        }else{

            product.stock -= item.qty;

            if(product.stock < 0){
                product.stock = 0;
            }

        }

    }

});

localStorage.setItem(
    "products",
    JSON.stringify(products)
);
 localStorage.setItem("orders",JSON.stringify(orders));
 alert("Bill Saved Successfully");
 cart=[];render();
}
</script>
</body>
</html>
