<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Retail Nanban Billing POS</title>

<link rel="stylesheet" href="css/billing.css">

</head>

<body>

<header>
    Retail Nanban Billing POS
</header>

<div class="wrap">

    <!-- Left Side -->
    <div class="card">

        <h2>Customer</h2>

        <input
            id="custName"
            placeholder="Customer Name">

        <input
            id="custPhone"
            placeholder="Phone Number">


        <h2>Add Product</h2>

        <input
            id="sku"
            placeholder="🔍 Scan Barcode..."
            onkeydown="searchSKU(event)"
            autofocus>

        <input
            id="pname"
            placeholder="Product Name"
            readonly>

        <div class="product-row">

            <input
                id="qty"
                type="number"
                value="1"
                min="1">

            <input
                id="price"
                type="number"
                placeholder="Price"
                readonly>

            <select id="size">
                <option>S</option>
                <option>M</option>
                <option>L</option>
                <option>XL</option>
                <option>XXL</option>
            </select>

            <button onclick="addItem()">
                ➕ ADD
            </button>

        </div>

        <table>

            <thead>

                <tr>

                    <th>Product</th>
                    <th>Size</th>
                    <th>Qty</th>
                    <th>Rate</th>
                    <th>Total</th>
                    <th>Action</th>

                </tr>

            </thead>

            <tbody id="cart">

            </tbody>

        </table>

    </div>

    <!-- Right Side -->

    <div class="card">

        <h2>Bill Summary</h2>

        <div class="total">

            <p>

                <span>Subtotal</span>

                <span id="sub">₹0</span>

            </p>

            <p>

                <span>Discount</span>

                <span>₹0</span>

            </p>

            <h3>

                <span>Grand Total</span>

                <span id="grand">₹0</span>

            </h3>

        </div>

        <select id="payment">

            <option>Cash</option>
            <option>UPI</option>
            <option>Card</option>

        </select>

        <button onclick="saveBill()">

            💾 SAVE BILL

        </button>

        <button onclick="window.print()">

            🖨 PRINT BILL

        </button>

    </div>

</div>

<script src="js/billing.js"></script>

</body>
</html>
