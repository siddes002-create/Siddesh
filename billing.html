<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Retail Nanban Billing</title>

<style>

body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#f4f4f4;
}

.header{
    background:#ff4d73;
    color:white;
    text-align:center;
    padding:15px;
    font-size:30px;
    font-weight:bold;
}

.container{
    width:95%;
    margin:20px auto;
    background:white;
    padding:20px;
    border-radius:10px;
}

input,select{
    padding:10px;
    width:100%;
    margin:5px 0 15px;
}

table{
    width:100%;
    border-collapse:collapse;
}

table th{
    background:#ff4d73;
    color:white;
    padding:10px;
}

table td{
    padding:10px;
    border-bottom:1px solid #ddd;
}

button{
    background:#ff4d73;
    color:white;
    border:none;
    padding:10px 20px;
    cursor:pointer;
    border-radius:5px;
}

.summary{
    width:300px;
    margin-left:auto;
    margin-top:20px;
}

.summary p{
    display:flex;
    justify-content:space-between;
}

</style>

</head>

<body>

<div class="header">
Retail Nanban Billing
</div>

<div class="container">

<h3>Customer Details</h3>

<input type="text" placeholder="Customer Name">

<input type="text" placeholder="Phone Number">

<h3>Add Product</h3>

<input type="text" placeholder="Scan Barcode">

<input type="text" placeholder="Search Product">

<table>

<thead>

<tr>

<th>Product</th>

<th>Size</th>

<th>Qty</th>

<th>Rate</th>

<th>Total</th>

<th>Action</th>

</tr>

</thead>

<tbody>

<tr>

<td>Linen Shirt</td>

<td>M</td>

<td>1</td>

<td>999</td>

<td>999</td>

<td>🗑</td>

</tr>

</tbody>

</table>

<div class="summary">

<p><span>Subtotal</span><span>₹999</span></p>

<p><span>Discount</span><span>₹0</span></p>

<p><span><b>Grand Total</b></span><span><b>₹999</b></span></p>

</div>

<br>

<select>

<option>Cash</option>

<option>UPI</option>

<option>Card</option>

</select>

<button>Save Bill</button>

<button onclick="window.print()">Print Bill</button>

</div>

</body>
</html>
