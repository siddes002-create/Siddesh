<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Retail Nanban Billing POS</title>

<link rel="stylesheet" href="css/billing.css">

</head>

<body>

<header>

<div class="logo">
🛒 Retail Nanban POS
</div>

<div id="liveTime"></div>

</header>


<div class="container">

<div class="left">

<!-- Customer -->

<div class="card">

<h2>Customer</h2>

<input
id="custName"
placeholder="Customer Name">

<input
id="custPhone"
placeholder="Phone Number">

</div>

<!-- Product -->

<div class="card">

<h2>Scan Product</h2>

<div class="product-preview">

<img
id="productImage"
src="https://via.placeholder.com/140x180?text=No+Image">

<div>

<h3 id="previewName">

No Product

</h3>

<p>

Style :
<span id="previewStyle">-</span>

</p>

<p>

Stock :
<span id="previewStock">0</span>

</p>

<span
id="stockStatus"
class="stock">
No Stock
</span>

</div>

</div>

<input

id="sku"

placeholder="🔍 Scan Barcode"

onkeydown="searchSKU(event)"

autofocus>

<div class="row">

<input
id="qty"
type="number"
value="1">

<select id="size">

<option>S</option>
<option>M</option>
<option>L</option>
<option>XL</option>
<option>XXL</option>

</select>

<button onclick="addItem()">

➕ Add

</button>

</div>

</div>


<!-- Cart -->

<div class="card">

<h2>

🛒 Shopping Cart

</h2>

<table>

<thead>

<tr>

<th>Product</th>

<th>Size</th>

<th>Qty</th>

<th>Rate</th>

<th>Total</th>

<th></th>

</tr>

</thead>

<tbody id="cart">

</tbody>

</table>

</div>

</div>



<div class="right">

<div class="card">

<h2>

💰 Bill Summary

</h2>

<div class="summary">

<p>

<span>Items</span>

<span id="items">

0

</span>

</p>

<p>

<span>Subtotal</span>

<span id="sub">

₹0

</span>

</p>

<p>

<span>Discount</span>

<span>

₹0

</span>

</p>

<h1 id="grand">

₹0

</h1>

</div>

<select id="payment">

<option>Cash</option>

<option>UPI</option>

<option>Card</option>

</select>

<button onclick="saveBill()">

💾 Save Bill

</button>

<button onclick="window.print()">

🖨 Print Bill

</button>

</div>

</div>

</div>

<script src="js/billing.js"></script>

</body>

</html>
