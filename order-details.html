<!DOCTYPE html>
<html>
<head>
<title>Order Details</title>

<style>
body{
font-family:Arial,sans-serif;
padding:20px;
background:#f5f5f5;
}

.card{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 2px 10px rgba(0,0,0,.1);
max-width:900px;
margin:auto;
}

h2{
margin-bottom:20px;
}

.status-btn{
padding:10px 15px;
margin:5px;
cursor:pointer;
}

.timeline{
margin-top:20px;
padding:10px;
background:#fafafa;
border:1px solid #ddd;
}
</style>
</head>

<body>

<div class="card">
<button onclick="history.back()"
style="
padding:10px 15px;
margin-bottom:20px;
background:#333;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
">
← Back
</button>

<h2 id="orderNo"></h2>
<button onclick="printInvoice()"
style="
padding:10px 15px;
background:#28a745;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
margin-bottom:20px;
">
🖨 Print Invoice
</button>

<div id="orderInfo"></div>

<h3>Products</h3>
<div id="productList"></div>

<h3>Order Status</h3>

<select id="statusSelect"
onchange="updateStatus(this.value)"
style="padding:10px;margin-bottom:15px;">

<option value="Confirmed">Confirmed</option>
<option value="Packed">Packed</option>
<option value="Shipped">Shipped</option>
<option value="Delivered">Delivered</option>

</select>

<p>
<b>Current Status :</b>
<span id="currentStatus"></span>
</p>

<h3>Tracking Updates</h3>

<div id="timeline" class="timeline"></div>

</div>

<script>

let params = new URLSearchParams(window.location.search);

let index = params.get("id");

let orders =
JSON.parse(localStorage.getItem("orders")) || [];

let order = orders[index];
document.getElementById("orderNo").innerText =
"Order No : " +
(order.orderNo || ("RN-" + String(Number(index)+1).padStart(4,"0")));
document.getElementById("statusSelect").value =
order.status || "Confirmed";

document.getElementById("currentStatus").innerText =
order.status || "Pending";
let orderTotal = 0;

(order.items || []).forEach(item=>{
orderTotal += (item.price || 0) * (item.qty || 1);
});
document.getElementById("orderInfo").innerHTML = `
<p><b>Customer:</b> ${order.customer}</p>
<p><b>Phone:</b> ${order.phone}</p>
<p><b>Address:</b> ${order.address}</p>
<p><b>Status:</b> <span id="statusText">${order.status || "Pending"}</span></p>
<p><b>Payment:</b> ${order.payment || "Pending"}</p>
<p><b>Total:</b> ₹${orderTotal}</p>
`;
let productsHtml = "";

(order.items || []).forEach(item=>{

productsHtml += `
<p>
${item.name}
|
${item.size}
|
Qty : ${item.qty}
</p>
`;

});

document.getElementById("productList").innerHTML =
productsHtml;

function updateStatus(status){

order.status = status;

if(!order.timeline){
order.timeline = [];
}

let lastUpdate =
order.timeline &&
order.timeline.length > 0
? order.timeline[order.timeline.length - 1]
: "";

if(!lastUpdate.includes(status)){

order.timeline.push(
new Date().toLocaleString()
+ " - " +
status
);

}

orders[index] = order;

localStorage.setItem(
"orders",
JSON.stringify(orders)
);

document.getElementById("currentStatus").innerText = status;
document.getElementById("statusText").innerText = status;
document.getElementById("statusSelect").value = status;

document.getElementById("timeline").innerHTML =
(order.timeline || []).join("<br>");

}
function printInvoice(){

let invoiceWindow = window.open("", "_blank");

invoiceWindow.document.write(`
<html>
<head>
<title>Invoice</title>
<style>
body{
font-family:Arial;
padding:20px;
}
table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}
table,th,td{
border:1px solid #000;
}
th,td{
padding:8px;
text-align:left;
}
</style>
</head>
<body>

<div style="text-align:center;margin-bottom:20px;">
    <h1 style="margin:0;">Retail Nanban</h1>
    <p style="margin:5px 0;">Online Fashion Store</p>
</div>

<hr>

<p><b>Invoice No:</b> INV-${order.orderNo}</p>

<p><b>Order No:</b> ${order.orderNo}</p>

<p><b>Date:</b> ${new Date().toLocaleDateString()}</p>

<p><b>Customer:</b> ${order.customer}</p>
<p><b>Phone:</b> ${order.phone}</p>
<p><b>Address:</b> ${order.address}</p>

<table>
<tr>
<th>Product</th>
<th>Size</th>
<th>Qty</th>
<th>Price</th>
</tr>

${(order.items || []).map(item => `
<tr>
<td>${item.name}</td>
<td>${item.size}</td>
<td>${item.qty}</td>
<td>₹${item.price || 0}</td>
</tr>
`).join("")}

</table>

<div style="
width:250px;
margin-left:auto;
margin-top:20px;
">

<p>
<span>Subtotal</span>
<span style="float:right">
₹${orderTotal}
</span>
</p>

<p>
<span>Shipping</span>
<span style="float:right">
₹0
</span>
</p>

<hr>

<h3>
Grand Total
<span style="float:right">
₹${orderTotal}
</span>
</h3>

</div>

<hr>

<p style="text-align:center;">
Thank you for shopping with Retail Nanban ❤️
</p>

</body>
</html>
`);

invoiceWindow.document.close();
invoiceWindow.print();

}  
</script>

</body>
</html>
