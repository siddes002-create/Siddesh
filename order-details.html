<!DOCTYPE html>
<html>
<head>
<title>Order Details</title>

<style>
body{
font-family:Arial,sans-serif;
padding:20px;
background:#f5f5f5;
}

.card{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 2px 10px rgba(0,0,0,.1);
max-width:900px;
margin:auto;
}

h2{
margin-bottom:20px;
}

.status-btn{
padding:10px 15px;
margin:5px;
cursor:pointer;
}

.timeline{
margin-top:20px;
padding:10px;
background:#fafafa;
border:1px solid #ddd;
}
</style>
</head>

<body>

<div class="card">

<h2 id="orderNo"></h2>

<div id="orderInfo"></div>

<h3>Products</h3>
<div id="productList"></div>

<h3>Actions</h3>

<button class="status-btn" onclick="updateStatus('Confirmed')">Confirm</button>

<button class="status-btn" onclick="updateStatus('Packed')">Packed</button>

<button class="status-btn" onclick="updateStatus('Shipped')">Shipped</button>

<button class="status-btn" onclick="updateStatus('Delivered')">Delivered</button>

<h3>Tracking Updates</h3>

<div id="timeline" class="timeline"></div>

</div>

<script>

let params = new URLSearchParams(window.location.search);

let index = params.get("id");

let orders =
JSON.parse(localStorage.getItem("orders")) || [];

let order = orders[index];

document.getElementById("orderNo").innerHTML =
"Order No : RN-" +
String(Number(index)+1).padStart(4,"0");

document.getElementById("orderInfo").innerHTML = `
<p><b>Customer:</b> ${order.customer}</p>
<p><b>Phone:</b> ${order.phone}</p>
<p><b>Address:</b> ${order.address}</p>
<p><b>Status:</b> ${order.status || "Pending"}</p>
`;

let productsHtml = "";

(order.items || []).forEach(item=>{

productsHtml += `
<p>
${item.name}
|
${item.size}
|
Qty : ${item.qty}
</p>
`;

});

document.getElementById("productList").innerHTML =
productsHtml;

function updateStatus(status){

order.status = status;

if(!order.timeline){
order.timeline = [];
}

order.timeline.push(
new Date().toLocaleString()
+ " - " +
status
);

orders[index] = order;

localStorage.setItem(
"orders",
JSON.stringify(orders)
);

location.reload();

}

if(order.timeline){

document.getElementById("timeline").innerHTML =
order.timeline.join("<br>");

}

</script>

</body>
</html>
