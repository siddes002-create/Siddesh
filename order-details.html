<!DOCTYPE html>
<html>
<head>
<title>Order Details</title>

<style>
body{
font-family:Arial,sans-serif;
padding:20px;
background:#f5f5f5;
}

.card{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 2px 10px rgba(0,0,0,.1);
max-width:900px;
margin:auto;
}

h2{
margin-bottom:20px;
}

.status-btn{
padding:10px 15px;
margin:5px;
cursor:pointer;
}

.timeline{
margin-top:20px;
padding:10px;
background:#fafafa;
border:1px solid #ddd;
}
</style>
</head>

<body>

<div class="card">
<button onclick="history.back()"
style="
padding:10px 15px;
margin-bottom:20px;
background:#333;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
">
← Back
</button>

<h2 id="orderNo"></h2>
<button onclick="printInvoice()"
style="
padding:10px 15px;
background:#28a745;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
margin-bottom:20px;
">
🖨 Print Invoice
</button>

<div id="orderInfo"></div>

<h3>Products</h3>
<div id="productList"></div>

<h3>Order Status</h3>

<select id="statusSelect"
onchange="updateStatus(this.value)"
style="padding:10px;margin-bottom:15px;">

<option value="Confirmed">Confirmed</option>
<option value="Packed">Packed</option>
<option value="Shipped">Shipped</option>
<option value="Delivered">Delivered</option>

</select>

<p>
<b>Current Status :</b>
<span id="currentStatus"></span>
</p>

<h3>Tracking Updates</h3>

<div id="timeline" class="timeline"></div>

</div>

<script>

let params = new URLSearchParams(window.location.search);

let index = params.get("id");

let orders =
JSON.parse(localStorage.getItem("orders")) || [];

let order = orders[index];
document.getElementById("orderNo").innerText =
"Order No : " +
(order.orderNo || ("RN-" + String(Number(index)+1).padStart(4,"0")));
document.getElementById("statusSelect").value =
order.status || "Confirmed";

document.getElementById("currentStatus").innerText =
order.status || "Pending";
let orderTotal = 0;

(order.items || []).forEach(item=>{
orderTotal += (item.price || 0) * (item.qty || 1);
});
document.getElementById("orderInfo").innerHTML = `
<p><b>Order Date:</b> ${order.orderDate || "N/A"}</p>
<p><b>Customer:</b> ${order.customer}</p>
<p><b>Phone:</b> ${order.phone}</p>
<p>
<a href="https://wa.me/91${order.phone}"
target="_blank"
style="
background:#25D366;
color:white;
padding:8px 12px;
border-radius:5px;
text-decoration:none;
display:inline-block;
margin:5px 0;
">
📱 WhatsApp Customer
</a>
</p>
<p><b>Address:</b> ${order.address}</p>
<p>
<b>Status:</b>
<span id="statusText"
style="
padding:5px 12px;
border-radius:20px;
color:white;
background:${
(order.status==="Delivered") ? "#28a745" :
(order.status==="Shipped") ? "#fd7e14" :
(order.status==="Packed") ? "#0d6efd" :
"#ffc107"
};
">
${order.status || "Pending"}
</span>
</p>
<p>
<b>Payment:</b>

<select onchange="updatePayment(this.value)">
<option value="Pending"
${order.payment==="Pending"?"selected":""}>
Pending
</option>

<option value="Paid"
${order.payment==="Paid"?"selected":""}>
Paid
</option>

<option value="COD"
${order.payment==="COD"?"selected":""}>
COD
</option>

</select>

</p>
<p><b>Total:</b> ₹${orderTotal}</p>
`;
let productsHtml = `
<table style="
width:100%;
border-collapse:collapse;
margin-top:10px;
">
<tr>
<th style="border:1px solid #ddd;padding:8px;">Photo</th>
<th style="border:1px solid #ddd;padding:8px;">Product</th>
<th style="border:1px solid #ddd;padding:8px;">Size</th>
<th style="border:1px solid #ddd;padding:8px;">Qty</th>
</tr>
`;

(order.items || []).forEach(item=>{

productsHtml += `
<tr>
<td style="border:1px solid #ddd;padding:8px;">
<img src="${item.image}" width="60" height="60"
style="object-fit:cover;border-radius:6px;">
</td>

<td style="border:1px solid #ddd;padding:8px;">${item.name}</td>
<td style="border:1px solid #ddd;padding:8px;">${item.size}</td>
<td style="border:1px solid #ddd;padding:8px;">
<div style="display:flex;align-items:center;gap:10px;">
${item.qty}
<input type="checkbox">
</div>
style="margin-left:10px;">
</td>
</tr>
`;

});

productsHtml += `</table>`;

document.getElementById("productList").innerHTML =
productsHtml;

function updateStatus(status){

order.status = status;

if(!order.timeline){
order.timeline = [];
}

let lastUpdate =
order.timeline &&
order.timeline.length > 0
? order.timeline[order.timeline.length - 1]
: "";

if(!lastUpdate.includes(status)){

order.timeline.push(
new Date().toLocaleString()
+ " - " +
status
);

}

orders[index] = order;

localStorage.setItem(
"orders",
JSON.stringify(orders)
);

document.getElementById("currentStatus").innerText = status;
document.getElementById("statusText").innerText = status;
let badge = document.getElementById("statusText");

badge.style.background =
status==="Delivered" ? "#28a745" :
status==="Shipped" ? "#fd7e14" :
status==="Packed" ? "#0d6efd" :
"#ffc107";

badge.style.color = "white";    
document.getElementById("statusSelect").value = status;

document.getElementById("timeline").innerHTML =
(order.timeline && order.timeline.length > 0)
? order.timeline[order.timeline.length - 1]
: "No Updates";

}
function updatePayment(payment){

order.payment = payment;

orders[index] = order;

localStorage.setItem(
"orders",
JSON.stringify(orders)
);

}    
function printInvoice(){

let invoiceWindow = window.open("", "_blank");

invoiceWindow.document.write(`
<html>
<head>
<title>Invoice</title>

<style>
body{
font-family:Arial;
padding:20px;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

table,th,td{
border:1px solid #000;
}

th,td{
padding:8px;
text-align:left;
}
</style>

</head>

<body>

<div style="text-align:center;margin-bottom:20px;">
<h1 style="margin:0;">Retail Nanban</h1>
<p style="margin:5px 0;">Online Fashion Store</p>
</div>

<hr>

<p><b>Invoice No:</b> INV-${order.orderNo || ("RN-" + String(Number(index)+1).padStart(4,"0"))}</p>

<p><b>Order No:</b> ${order.orderNo || ("RN-" + String(Number(index)+1).padStart(4,"0"))}</p>
<p><b>Date:</b> ${new Date().toLocaleDateString()}</p>
<p>
<b>Status:</b>
<span style="
background:#28a745;
color:white;
padding:4px 10px;
border-radius:20px;
font-size:12px;
">
${order.status || "Confirmed"}
</span>
</p>

<p><b>Customer:</b> ${order.customer}</p>
<p><b>Phone:</b> ${order.phone}</p>
<p><b>Address:</b> ${order.address}</p>

<table>

<tr>
<th>Photo</th>
<th>Product</th>
<th>Size</th>
<th>Qty</th>
<th>Price</th>
</tr>

${(order.items || []).map(item => `
<tr>
<td>
<img src="${item.image}" width="50">
</td>
<td>${item.name}</td>
<td>${item.size}</td>
<td>${item.qty}</td>
<td>₹${item.price || 0}</td>
</tr>
`).join("")}

</table>

<div style="
width:250px;
margin-left:auto;
margin-top:20px;
">

<p>
<span>Subtotal</span>
<span style="float:right">
₹${orderTotal}
</span>
</p>

<p>
<span>Shipping</span>
<span style="float:right">
₹0
</span>
</p>

<hr>

<h3>
Grand Total
<span style="float:right">
₹${orderTotal}
</span>
</h3>

</div>

<hr>

<p style="text-align:center;">
<p style="text-align:center;">
Thank you for shopping with Retail Nanban ❤️
</p>

<p style="text-align:center;color:gray;font-size:12px;">
This is a computer generated invoice. No signature required.
</p>
</p>

</body>
</html>
`);

invoiceWindow.document.close();
invoiceWindow.onload = function(){
    invoiceWindow.print();

    invoiceWindow.onafterprint = function(){
        invoiceWindow.close();
    };
};

}</script>

</body>
</html>
